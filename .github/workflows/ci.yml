name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      AUTH_SECRET: "ci-dummy-secret-minimum-16-chars"
      AUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: TypeScript
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit Tests
        run: pnpm test
      - name: Build
        run: pnpm build
