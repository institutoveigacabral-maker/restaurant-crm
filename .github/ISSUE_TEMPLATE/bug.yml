name: Bug Report
description: Reportar um bug encontrado
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descricao
      description: O que aconteceu?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Como reproduzir o bug?
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria ter acontecido?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportamento atual
      description: O que aconteceu de fato?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Ambiente
      description: Browser, OS, versao
      placeholder: Chrome 120, macOS 15
